{% extends "base.html" %}

{% block title %}Login - PureSkin{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card card">
        <div class="auth-header">
            <i class="fas fa-leaf"></i>
            <h2>Welcome Back</h2>
            <p>Sign in to continue your skin journey</p>
        </div>

        <form method="POST" action="{{ url_for('auth.login_post') }}" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" name="email" id="email" placeholder="your@email.com" required autofocus>
            </div>

            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" id="password" placeholder="••••••••" required>
            </div>

            <div class="form-group checkbox-group">
                <label class="checkbox-label">
                    <input type="checkbox" name="remember">
                    <span>Remember me</span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary btn-block">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('auth.signup') }}">Sign up here</a></p>
        </div>
    </div>
</div>
{% endblock %}
